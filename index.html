<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemical Secret · Reader + Audio + Highlight</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <div>
        <h1>Chemical Secret</h1>
        <p class="sub">Oxford Bookworms · Read · Listen · Highlight</p>
      </div>
    </div>
  </header>

  <main id="view-read" class="view active">
    <section class="pdf-pane">
      <div class="pdf-toolbar">
        <button id="prevPage" class="btn-round" title="Previous page">‹</button>
        <span id="pageInfo" class="page-info">Page 1 / –</span>
        <button id="nextPage" class="btn-round" title="Next page">›</button>
        <label class="zoom">
          Zoom
          <select id="zoom">
            <option value="1">100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
        </label>
        <label class="fit">
          <input type="checkbox" id="fitWidth" checked /> Fit width
        </label>
      </div>
      <div id="pdfScroll" class="pdf-scroll">
        <div id="pdfViewport" class="pdf-viewport">
          <div id="pdfLoader" class="loader">Loading PDF…</div>
        </div>
      </div>
    </section>

    <aside class="side-pane">
      <!-- HIGHLIGHT TOOLS -->
      <div class="card hl-card">
        <h3>Highlight</h3>
        <div class="hl-row">
          <button id="hlToggle" class="btn-ghost">✏️ Highlight: OFF</button>
        </div>
        <div class="hl-row">
          <span class="hl-label">Color</span>
          <div class="swatches" id="swatches">
            <button class="swatch active" data-color="#FFE45C" style="background:#FFE45C"></button>
            <button class="swatch" data-color="#FF385C" style="background:#FF385C"></button>
            <button class="swatch" data-color="#5BC8FF" style="background:#5BC8FF"></button>
            <button class="swatch" data-color="#7BE37B" style="background:#7BE37B"></button>
          </div>
        </div>
        <div class="hl-row">
          <span class="hl-label">Size</span>
          <select id="hlSize">
            <option value="10">Thin</option>
            <option value="18" selected>Medium</option>
            <option value="28">Thick</option>
          </select>
        </div>
        <div class="hl-row">
          <button id="clearPage" class="btn-ghost small">Clear this page</button>
          <button id="clearAll" class="btn-ghost small danger">Clear all</button>
        </div>
        <p class="hl-hint">Turn highlight ON, then drag the mouse over the book to mark text.</p>
      </div>

      <!-- AUDIO -->
      <div class="card audio-card">
        <div class="audio-head">
          <span class="now">Now playing</span>
          <span id="trackTitle" class="track-title">Track 01</span>
        </div>
        <div class="progress-wrap">
          <span id="curTime" class="t">0:00</span>
          <input id="seek" class="seek" type="range" min="0" max="100" value="0" step="0.1" />
          <span id="durTime" class="t">0:00</span>
        </div>
        <div class="audio-controls">
          <button id="prevTrack" class="btn-round" title="Previous track">⏮</button>
          <button id="playPause" class="btn-play" title="Play / Pause">▶</button>
          <button id="nextTrack" class="btn-round" title="Next track">⏭</button>
          <div class="speed">
            <label for="speed">Speed</label>
            <select id="speed">
              <option value="0.5">0.5×</option>
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
            </select>
          </div>
        </div>
        <div class="tracklist" id="tracklist"></div>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="js/app.js?v=7"></script>
</body>
</html>
